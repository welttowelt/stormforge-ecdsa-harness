name: Redaction check

on:
  push:
  pull_request:

jobs:
  redaction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run working-tree redaction scan
        run: scripts/redaction-check.sh

      - name: Run git-history redaction scan
        run: scripts/redaction-check.sh --history
