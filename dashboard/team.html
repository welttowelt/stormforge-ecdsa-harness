<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ecdsa.fail — team Storm</title>
<style>
  :root{
    --bg:#0e3a2c; --panel:rgba(180,230,205,0.06); --panel-bd:rgba(180,230,205,0.16);
    --ink:#e9f5ee; --mute:#8fb3a2; --dim:#6f9384; --accent:#4ad99a;
    --rec:#e9a23b; --base:#9fb8ab; --grid:rgba(180,230,205,0.10);
    --mono:'DM Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#072018;color:var(--ink);font-family:var(--mono);
       -webkit-font-smoothing:antialiased;padding:24px 16px}
  .wrap{max-width:860px;margin:0 auto}
  .card{background:var(--bg);border:1px solid var(--panel-bd);border-radius:14px;padding:22px 24px}
  .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--mute);text-transform:uppercase}
  h1{font-size:19px;font-weight:500;margin:6px 0 4px;color:var(--ink)}
  .sub{font-size:13px;color:var(--mute);margin:0 0 18px;line-height:1.6}
  .sub b{font-weight:500;color:var(--accent)}
  .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:4px}
  .stat{background:var(--panel);border:1px solid var(--panel-bd);border-radius:10px;padding:14px 16px}
  .stat .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .stat .val{font-size:24px;color:var(--ink);margin:4px 0 2px}
  .stat .sub2{font-size:12px;color:var(--dim);margin:0;line-height:1.45}
  h2{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);font-weight:500;
     margin:24px 0 12px;border-top:1px solid var(--panel-bd);padding-top:16px}
  svg{width:100%;height:auto;display:block}
  .legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--mute);margin-top:8px}
  .legend span{display:flex;gap:6px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .box{background:var(--panel);border:1px solid var(--panel-bd);border-radius:10px;padding:13px 15px}
  .box .h{font-size:13px;color:var(--accent);margin:0 0 5px}
  .box .b{font-size:12px;color:var(--mute);line-height:1.55;margin:0}
  .team{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .member{background:var(--panel);border:1px solid var(--panel-bd);border-radius:10px;padding:15px 12px;text-align:center}
  .member .nm{font-size:15px;color:var(--ink);display:block;margin-bottom:5px}
  .member a{font-size:12px;color:var(--accent);text-decoration:none}
  .member a:hover{text-decoration:underline}
  .spirit{font-size:12.5px;color:var(--mute);line-height:1.6;margin:14px 0 0;text-align:center}
  footer{font-size:11px;color:var(--dim);line-height:1.6;margin-top:18px;border-top:1px solid var(--panel-bd);padding-top:12px}
  footer a{color:var(--mute)}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <span class="eyebrow">storm · secp256k1 point-add · team contributions</span>
    <h1>team Storm on ecdsa.fail</h1>
    <p class="sub" id="sub"></p>

    <section class="stats" id="stats"></section>

    <h2>our promoted frontier moves · main board</h2>
    <div id="chart"></div>
    <div class="legend">
      <span><span class="dot" style="background:#4ad99a"></span>each dot = one accepted (promoted) row · lower score is better</span>
    </div>

    <h2>what we contributed</h2>
    <section class="grid2" id="contribs"></section>

    <h2>the team</h2>
    <section class="team" id="teamEl"></section>
    <p class="spirit" id="spirit"></p>

    <footer id="src"></footer>
  </div>
</div>

<script>
const ASOF = "18 Jun 2026";

/* the team — github handles only, no titles: one team, flat */
const team = [
  {name:"Oli",   gh:"welttowelt"},
  {name:"Lucas", gh:"0xLucqs"},
  {name:"Sam",   gh:"SamrendraS"},
  {name:"Akash", gh:"Akashneelesh"}
];

/* the 13 promoted (accepted) primary-score rows, jun 6-10 2026.
   score = peak qubits x avg executed Toffoli (lower is better). public ecdsa.fail API. */
const moves = [
  {d:"jun 6",  q:1309, score:1984166492},
  {d:"jun 6",  q:1309, score:1982805132},
  {d:"jun 6",  q:1309, score:1968567139},
  {d:"jun 6",  q:1309, score:1960613655},
  {d:"jun 7",  q:1307, score:1917944080},
  {d:"jun 7",  q:1306, score:1907351618},
  {d:"jun 7",  q:1306, score:1906003826},
  {d:"jun 8",  q:1300, score:1824581200},
  {d:"jun 8",  q:1299, score:1823175078},
  {d:"jun 8",  q:1298, score:1822107738},
  {d:"jun 8",  q:1297, score:1820670235},
  {d:"jun 9",  q:1285, score:1779704440},
  {d:"jun 10", q:1226, score:1759744004}
];

const contribs = [
  {h:"main-board frontier moves", b:"13 promoted (accepted) primary-score rows from jun 6–10, totaling 29.9M official score-improvement points, down to an accepted 1226-qubit row — a global qubit floor at the time."},
  {h:"sub-1000 low-Q race", b:"public measured rows down to 978q, with our 979q circuit independently re-validated at 0/0/0 (classical / phase / ancilla) on the full 9024-shot trusted eval — a contribution to the sub-1000-qubit challenge, where nasqret and jieyilong currently lead."},
  {h:"open harness + operator stack", b:"the public storm ecdsa harness, shared agent-readable notes, mailbox + read-receipt discipline, multi-model (codex / claude) orchestration and validation gates — the operating layer, not just final circuits."},
  {h:"research map", b:"a floor argument for the standard approach (~1050q, argued two ways: a published theoretical bound and the realized Trail of Bits circuit), with sub-1000 the open structural target — plus a closed-lever map of what's already dead or parked."}
];

document.getElementById("sub").innerHTML =
  `team Storm in the ecdsa.fail race for the cheapest reversible secp256k1 point-add. across June 2026 we landed <b>13 promoted frontier moves</b> on the main qubit×gate board, then pushed into the <b>sub-1000-qubit</b> race with measured rows down to 978q — on top of the open tooling and validation discipline below.`;

document.getElementById("stats").innerHTML = [
  {lbl:"promoted frontier moves", val:"13", sub2:"accepted main-board wins · jun 6–10"},
  {lbl:"official score gained", val:"29.9M", sub2:"direct score-improvement points"},
  {lbl:"low-Q floor reached", val:"978q", sub2:"public measured · 979q re-validated 0/0/0"}
].map(c=>`<div class="stat"><div class="lbl">${c.lbl}</div><div class="val num">${c.val}</div><div class="sub2">${c.sub2}</div></div>`).join("");

/* ---- chart: the 13 promoted frontier moves (score descending) ---- */
const fmtB = s => (s/1e9).toFixed(2)+"B";
const W=720,H=300,M={l:60,r:120,t:30,b:46};
const pw=W-M.l-M.r, ph=H-M.t-M.b;
const n=moves.length;
const sMin=1.74e9, sMax=2.0e9;
const X=i=>M.l+(i/(n-1))*pw;
const Y=s=>M.t+(sMax-s)/(sMax-sMin)*ph;

let s=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Team Storm's 13 promoted frontier moves on the main ecdsa.fail board, June 6 to 10 2026. The qubit×gate score fell from about 1.98 billion at 1309 qubits to 1.76 billion at an accepted 1226-qubit row, a global qubit floor at the time.">`;
s+=`<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8fb3a2" stroke-width="1.4"/></marker></defs>`;

[1.8e9,1.9e9,2.0e9].forEach(v=>{const y=Y(v);
  s+=`<line x1="${M.l}" y1="${y.toFixed(1)}" x2="${M.l+pw}" y2="${y.toFixed(1)}" stroke="var(--grid)"/>`;
  s+=`<text x="${M.l-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="11" fill="#6f9384">${fmtB(v)}</text>`;});
s+=`<text x="${M.l-40}" y="${M.t-12}" font-size="11" fill="#8fb3a2">Q×gate score</text>`;
[[0,"jun 6"],[7,"jun 8"],[12,"jun 10"]].forEach(([i,lab])=>{
  s+=`<text x="${X(i).toFixed(0)}" y="${M.t+ph+18}" text-anchor="middle" font-size="11" fill="#6f9384">${lab}</text>`;});

s+=`<path d="${moves.map((m,i)=>(i?'L':'M')+X(i).toFixed(1)+','+Y(m.score).toFixed(1)).join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>`;
moves.forEach((m,i)=> s+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(m.score).toFixed(1)}" r="4.5" fill="var(--accent)"/>`);

/* endpoint labels */
s+=`<text x="${(X(0)+8).toFixed(0)}" y="${(Y(moves[0].score)-8).toFixed(0)}" font-size="11" fill="#e9f5ee">start · 1309q</text>`;
s+=`<text x="${(X(n-1)+9).toFixed(0)}" y="${(Y(moves[n-1].score)-2).toFixed(0)}" font-size="11" fill="#e9f5ee">1226q</text>`;
s+=`<text x="${(X(n-1)+9).toFixed(0)}" y="${(Y(moves[n-1].score)+12).toFixed(0)}" font-size="10.5" fill="#4ad99a">global floor</text>`;

/* summary note, top-right empty space */
s+=`<text x="${(M.l+pw).toFixed(0)}" y="${(M.t+12).toFixed(0)}" text-anchor="end" font-size="11" fill="#8fb3a2">13 promoted moves</text>`;
s+=`<text x="${(M.l+pw).toFixed(0)}" y="${(M.t+27).toFixed(0)}" text-anchor="end" font-size="11" fill="#8fb3a2">−29.9M score</text>`;

/* better-direction arrow (down = lower score) */
const ax=X(3.4), ay=Y(1.86e9);
s+=`<line x1="${ax.toFixed(0)}" y1="${(ay-16).toFixed(0)}" x2="${ax.toFixed(0)}" y2="${(ay+26).toFixed(0)}" stroke="#8fb3a2" stroke-width="1.4" marker-end="url(#arr)"/>`;
s+=`<text x="${(ax+6).toFixed(0)}" y="${(ay+4).toFixed(0)}" font-size="11" fill="#8fb3a2">better</text>`;
s+=`</svg>`;
document.getElementById("chart").innerHTML=s;

document.getElementById("contribs").innerHTML = contribs
  .map(c=>`<div class="box"><p class="h">${c.h}</p><p class="b">${c.b}</p></div>`).join("");

document.getElementById("teamEl").innerHTML = team.map(m=>
  `<div class="member"><span class="nm">${m.name}</span>`+
  `<a href="https://github.com/${m.gh}" target="_blank" rel="noopener">@${m.gh}</a></div>`).join("");

document.getElementById("spirit").innerHTML =
  `one team — every win is the team's win. four of us, all cooking hard on the secp256k1 point-add problem, run with our codex &amp; claude research agents.`;

document.getElementById("src").innerHTML =
  `promoted rows are primary qubit×gate wins; the sub-1000q rows are public measured low-Q evidence, not primary-board wins. figures from the public ecdsa.fail API (${ASOF} capture); our circuits are re-validated locally at 0/0/0 on the full 9024-shot trusted eval. this is a public resource-estimation benchmark for one secp256k1 point-add — not a live exploit or a full Shor run. illustrative team view · <a href="leaderboard.html">the record frontier</a> · <a href="https://www.ecdsa.fail/">ecdsa.fail</a>`;
</script>
</body>
</html>
