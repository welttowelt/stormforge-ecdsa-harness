<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ecdsa.fail — record frontier</title>
<style>
  :root{
    --bg:#0e3a2c; --panel:rgba(180,230,205,0.06); --panel-bd:rgba(180,230,205,0.16);
    --ink:#e9f5ee; --mute:#8fb3a2; --dim:#6f9384; --accent:#4ad99a;
    --rec:#e9a23b; --base:#9fb8ab; --grid:rgba(180,230,205,0.10);
    --mono:'DM Mono','SF Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#072018;color:var(--ink);font-family:var(--mono);
       -webkit-font-smoothing:antialiased;padding:24px 16px}
  .wrap{max-width:860px;margin:0 auto}
  .card{background:var(--bg);border:1px solid var(--panel-bd);border-radius:14px;padding:22px 24px}
  .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--mute);text-transform:uppercase}
  h1{font-size:19px;font-weight:500;margin:6px 0 4px;color:var(--ink)}
  .sub{font-size:13px;color:var(--mute);margin:0 0 18px;line-height:1.6}
  .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--panel-bd);border-radius:10px;padding:14px 16px}
  .stat .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute)}
  .stat .val{font-size:26px;color:var(--ink);margin:4px 0 2px}
  .stat .sub{font-size:12px;color:var(--dim);margin:0}
  .caption{font-size:13px;color:var(--mute);line-height:1.6;margin:0 0 6px}
  .caption b{font-weight:500;color:var(--accent)}
  svg{width:100%;height:auto;display:block}
  .legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--mute);margin-top:8px}
  .legend span{display:flex;gap:6px;align-items:center}
  .dot{width:10px;height:10px;border-radius:50%}
  .ln{width:16px;height:0;border-top:2.5px solid var(--accent);align-self:center}
  footer{font-size:11px;color:var(--dim);line-height:1.6;margin-top:18px;border-top:1px solid var(--panel-bd);padding-top:12px}
  footer a{color:var(--mute)}
  .num{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <span class="eyebrow">secp256k1 point-add · qubit × gate frontier</span>
    <h1>the record frontier</h1>
    <p class="sub" id="sub"></p>

    <section class="stats" id="stats"></section>

    <p class="caption">two goals: <b>fewer qubits</b> and <b>fewer gates</b> — better is toward the bottom-left.
      the <b>line</b> connects the current record circuits. each one is best at something; together they're the frontier.</p>

    <div id="chart"></div>

    <div class="legend">
      <span><span class="ln"></span>record frontier</span>
      <span><span class="dot" style="background:#e9a23b"></span>record-holder</span>
      <span><span class="dot" style="background:#9fb8ab;opacity:.55"></span>earlier baseline</span>
    </div>

    <footer id="src"></footer>
  </div>
</div>

<script>
const ASOF = "18 Jun 2026";

const submissions = [
  {solver:"Trail of Bits", qubits:1050, toffoli:32300000, baseline:true},
  {solver:"nasqret",   qubits:966,  toffoli:34069641},
  {solver:"jieyilong", qubits:968,  toffoli:33476041},
  {solver:"jieyilong", qubits:973,  toffoli:28328177},
  {solver:"1caf521",   qubits:1168, toffoli:1432332}
];

const fmtT = t => (t/1e6).toFixed(t<10e6?2:1) + "M";
submissions.forEach(d => d.score = d.qubits * d.toffoli);

const live = submissions.filter(d=>!d.baseline);
const sorted = live.slice().sort((a,b)=> a.qubits-b.qubits || a.toffoli-b.toffoli);
let min = Infinity;
sorted.forEach(d => { if (d.toffoli < min){ d.frontier = true; min = d.toffoli; } else d.frontier = false; });

const fewestQ = live.reduce((a,b)=> b.qubits < a.qubits ? b : a);
const fewestT = live.reduce((a,b)=> b.toffoli < a.toffoli ? b : a);
const baseline = submissions.find(d=>d.baseline);

document.getElementById("sub").innerHTML =
  `the field's best circuits, ${ASOF}. since the ~${baseline.qubits.toLocaleString()}-qubit Trail of Bits baseline, solvers have pushed the record down to ${fewestQ.qubits} qubits and ${fmtT(fewestT.toffoli)} gates.`;

document.getElementById("stats").innerHTML = [
  {lbl:"fewest qubits", val:fewestQ.qubits, sub:fewestQ.solver},
  {lbl:"fewest gates", val:fmtT(fewestT.toffoli), sub:fewestT.solver}
].map(c=>`<div class="stat"><div class="lbl">${c.lbl}</div><div class="val num">${c.val}</div><div class="sub">${c.solver||c.sub}</div></div>`).join("");

const W=720,H=350,M={l:62,r:118,t:34,b:46};
const pw=W-M.l-M.r, ph=H-M.t-M.b;
const qs=submissions.map(d=>d.qubits), ts=submissions.map(d=>d.toffoli);
const qMin=Math.min(...qs)-10, qMax=Math.max(...qs)+10;
const lt=t=>Math.log10(t), tMin=lt(Math.min(...ts)/1.18), tMax=lt(Math.max(...ts)*1.12);
const X=q=>M.l+(q-qMin)/(qMax-qMin)*pw;
const Y=t=>M.t+(tMax-lt(t))/(tMax-tMin)*ph;

const front = live.filter(d=>d.frontier).sort((a,b)=>a.qubits-b.qubits);
let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Qubit versus gate-count record frontier for secp256k1 point-add as of ${ASOF}. The frontier runs from ${fewestQ.solver} at ${fewestQ.qubits} qubits down to ${fewestT.solver} at ${fewestT.qubits} qubits and ${fmtT(fewestT.toffoli)} gates, below an earlier ${baseline.qubits}-qubit baseline.">`;
s += `<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M1,1 L7,4.5 L1,8" fill="none" stroke="#8fb3a2" stroke-width="1.4"/></marker></defs>`;

[2e6,5e6,10e6,30e6].forEach(t=>{const y=Y(t);
  s+=`<line x1="${M.l}" y1="${y.toFixed(1)}" x2="${M.l+pw}" y2="${y.toFixed(1)}" stroke="var(--grid)"/>`;
  s+=`<text x="${M.l-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="11" fill="#6f9384">${fmtT(t)}</text>`;});
s+=`<text x="${M.l-38}" y="${M.t-14}" font-size="11" fill="#8fb3a2">gates (log)</text>`;
[Math.round(qMin+12),Math.round((qMin+qMax)/2),Math.round(qMax-12)].forEach(q=>{
  s+=`<text x="${X(q).toFixed(0)}" y="${M.t+ph+18}" text-anchor="middle" font-size="11" fill="#6f9384">${q}</text>`;});
s+=`<text x="${(M.l+pw).toFixed(0)}" y="${M.t+ph+34}" text-anchor="end" font-size="11" fill="#8fb3a2">qubits →</text>`;

const bx=X(baseline.qubits), by=Y(baseline.toffoli);
s+=`<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="4.5" fill="#9fb8ab" opacity="0.55"/>`;
s+=`<text x="${(bx+9).toFixed(0)}" y="${(by+4).toFixed(0)}" font-size="11" fill="#9fb8ab">baseline · ${baseline.solver} · ${baseline.qubits}q</text>`;

s+=`<path d="${front.map((d,i)=>(i?'L':'M')+X(d.qubits).toFixed(1)+','+Y(d.toffoli).toFixed(1)).join(' ')}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>`;
front.forEach(d=> s+=`<circle cx="${X(d.qubits).toFixed(1)}" cy="${Y(d.toffoli).toFixed(1)}" r="6" fill="var(--rec)"/>`);

const labels=[{d:fewestQ,ly:M.t+30},{d:live.find(d=>d.qubits===973),ly:M.t+50},{d:fewestT,right:true}];
labels.forEach(L=>{ if(!L.d) return; const d=L.d;
  const lx = L.right ? X(d.qubits)-10 : M.l+pw+8;
  const ly = L.right ? Y(d.toffoli)-2 : L.ly;
  if(!L.right) s+=`<line x1="${X(d.qubits).toFixed(1)}" y1="${Y(d.toffoli).toFixed(1)}" x2="${(lx-4).toFixed(0)}" y2="${ly}" stroke="#b4e6cd" stroke-width="0.6" stroke-opacity="0.4"/>`;
  s+=`<text x="${lx.toFixed(0)}" y="${L.right?ly:ly+4}" text-anchor="${L.right?'end':'start'}" font-size="11" fill="#e9f5ee">${d.solver} · ${d.qubits}q${L.right?' · '+fmtT(d.toffoli):''}</text>`;});

const ax=X(qMin+(qMax-qMin)*0.46), ay=Y(7e6);
s+=`<line x1="${ax.toFixed(0)}" y1="${(ay-18).toFixed(0)}" x2="${(ax-44).toFixed(0)}" y2="${(ay+34).toFixed(0)}" stroke="#8fb3a2" stroke-width="1.4" marker-end="url(#arr)"/>`;
s+=`<text x="${(ax+4).toFixed(0)}" y="${(ay-22).toFixed(0)}" font-size="11" fill="#8fb3a2">better — fewer of both</text>`;
s+=`</svg>`;
document.getElementById("chart").innerHTML = s;

document.getElementById("src").innerHTML =
  `record rows from the public ecdsa.fail submissions (${ASOF}); 1caf521 solver unverified · baseline ~32.3M gates is the published Trail of Bits trailmix figure (approx). illustrative redesign of the trajectory chart, not the official board · <a href="https://www.ecdsa.fail/">ecdsa.fail</a>`;
</script>
</body>
</html>
